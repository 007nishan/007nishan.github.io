<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nishan | Portfolio</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f6f8;
      color: #333;
    }

    /* Hamburger button */
    .hamburger {
      font-size: 30px;
      cursor: pointer;
      position: fixed;
      top: 15px;
      left: 15px;
      z-index: 1100;
      color: #0A66C2;
    }

    /* Sidebar */
    .sidebar {
      height: 100%;
      width: 250px;
      position: fixed;
      top: 0;
      left: -250px; /* hidden initially */
      background-color: #0A66C2;
      overflow-x: hidden;
      transition: 0.3s;
      padding-top: 60px;
      z-index: 1000;
    }

    .sidebar a {
      padding: 12px 20px;
      text-decoration: none;
      font-size: 18px;
      color: #fff;
      display: block;
      transition: 0.2s;
    }

    .sidebar a:hover {
      background-color: #074a9d;
    }

    /* Overlay for mobile */
    .overlay {
      position: fixed;
      height: 100%;
      width: 100%;
      top: 0;
      left: 0;
      background-color: rgba(0,0,0,0.4);
      display: none;
      z-index: 900;
    }

    /* Main content */
    .content {
      margin-left: 0;
      transition: margin-left 0.3s;
      padding: 20px;
    }

    /* Banner */
    .banner img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Profile section */
    .profile-section {
      max-width: 900px;
      margin: 20px auto;
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 20px;
      background-color: white;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .profile-section img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid #0A66C2;
      object-fit: cover;
    }

    .tagline h1 {
      margin: 0;
      font-size: 24px;
      color: #0A66C2;
    }

    .tagline p {
      margin: 5px 0 0 0;
      font-size: 16px;
      color: #555;
    }

    @media (max-width: 700px) {
      .profile-section {
        flex-direction: column;
        text-align: center;
      }

      .profile-section img {
        margin-bottom: 10px;
      }
    }
  </style>
</head>
<body>

  <!-- Hamburger -->
  <span class="hamburger" onclick="toggleSidebar()">&#9776;</span>

  <!-- Sidebar -->
  <div id="mySidebar" class="sidebar">
    <a href="projects.html" target="_blank">Projects</a>
    <a href="life.html" target="_blank">Life so far</a>
    <a href="learning.html" target="_blank">Presently learning</a>
    <a href="pipeline.html" target="_blank">Pipeline Learnings</a>
    <a href="art.html" target="_blank">Art</a>
    <a href="testimonials.html" target="_blank">Friends Testimonials</a>
  </div>

  <!-- Overlay -->
  <div id="overlay" class="overlay" onclick="closeSidebar()"></div>

  <!-- Main Content -->
  <div class="content">
    <!-- Banner -->
    <div class="banner">
      <img src="https://media.licdn.com/dms/image/v2/D5616AQEAVJhTSqCPUA/profile-displaybackgroundimage-shrink_350_1400/B56Zhq_YDpG0Ag-/0/1754141656187?e=1761177600&amp;v=beta&amp;t=nFW8ciRvoQt45Dfecq1qpyF5oJxykoOGfuG15tuNOAE" alt="Banner Image">
    </div>

    <!-- Profile Section -->
    <div class="profile-section">
      <img src="https://avatars.githubusercontent.com/u/105267926?s=400&u=a0134608c6aaeabae5dc97279691306c04d1730e&v=4" alt="Profile Photo">
      <div class="tagline">
        <h1>Nishan</h1>
        <p>Aspiring Data Analyst | Tech Enthusiast | Lifelong Learner</p>
      </div>
    </div>
  </div>

  <script>
    function toggleSidebar() {
      const sidebar = document.getElementById('mySidebar');
      const overlay = document.getElementById('overlay');
      if (sidebar.style.left === '0px') {
        sidebar.style.left = '-250px';
        overlay.style.display = 'none';
      } else {
        sidebar.style.left = '0px';
        overlay.style.display = 'block';
      }
    }

    function closeSidebar() {
      document.getElementById('mySidebar').style.left = '-250px';
      document.getElementById('overlay').style.display = 'none';
    }
  </script>

</body>
</html>
