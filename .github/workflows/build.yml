name: Build portfolio from single source of truth

# Trigger ONLY on source changes. The PUBLIC site is CV-only: this job publishes
# nothing but index.html + the CV files. Internal artifacts (linkedin.md,
# knowledge-graph/, extra pages) are generated but gitignored and never committed.
on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "build/**"
      - "assets/**"
      - ".github/workflows/build.yml"
  workflow_dispatch: {}   # allow manual "Run workflow" from the Actions tab

permissions:
  contents: write   # needed to commit regenerated artifacts back

concurrency:
  group: ssot-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install jinja2 python-docx

      - name: Build all surfaces (site + CV .tex/.docx; internal artifacts stay local)
        run: python build/build.py

      - name: Compile CV PDF (LaTeX)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: Nishanur_Rahman_CV.tex
          working_directory: cv
          latexmk_use_xelatex: false

      - name: Publish PDF to site root (downloadable at /Nishanur_Rahman_CV.pdf)
        run: cp cv/Nishanur_Rahman_CV.pdf ./Nishanur_Rahman_CV.pdf

      - name: Commit ONLY public CV artifacts (never internal ones)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Explicit allowlist — no `git add -A`, so private artifacts
          # (linkedin.md, knowledge-graph/, extra pages) can never be published.
          git add README.md index.html Nishanur_Rahman_CV.pdf \
                  cv/Nishanur_Rahman_CV.tex cv/Nishanur_Rahman_CV.docx cv/Nishanur_Rahman_CV.pdf
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: rebuild CV from resume.json [skip ci]"
            git push
          fi

      # --- Cross-repo sync: push the same README to the GitHub PROFILE repo
      #     (007nishan/007nishan) so the profile page auto-updates too.
      #     Requires a repo-scoped PAT stored as secret PROFILE_REPO_TOKEN.
      #     If the secret is absent, this step is skipped (CI stays green).
      - name: Sync README to profile repo (007nishan/007nishan)
        if: ${{ env.PROFILE_TOKEN != '' }}
        env:
          PROFILE_TOKEN: ${{ secrets.PROFILE_REPO_TOKEN }}
        run: |
          set -e
          tmp=$(mktemp -d)
          git clone --depth 1 "https://x-access-token:${PROFILE_TOKEN}@github.com/007nishan/007nishan.git" "$tmp"
          cp README.md "$tmp/README.md"
          cd "$tmp"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "Profile README already up to date."
          else
            git commit -m "chore: sync profile README from resume.json"
            git push
          fi
